version: '3.9'

services:
  bagisto:
    build:
      context: .
      dockerfile: docker/production/nginx/Dockerfile
      args:
        BAGISTO_VERSION: ${BAGISTO_VERSION:-v2.4.7}
        PHP_VERSION: ${PHP_VERSION:-8.3}
    image: bagisto-dokploy:latest
    env_file:
      - .env
    ports:
      - '80'
    depends_on:
      - elasticsearch
    volumes:
      - bagisto-mysql:/var/lib/mysql
      - bagisto-storage:/var/www/bagisto/storage
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - bagisto-elasticsearch:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  bagisto-mysql:
  bagisto-storage:
  bagisto-elasticsearch:
